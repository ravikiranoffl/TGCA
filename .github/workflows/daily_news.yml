name: Daily Global News Generator

on:
  schedule:
    - cron: '30 16 * * *' # 11:00 PM IST (17:30 UTC)
  workflow_dispatch:      # Manual trigger for testing

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install google-genai

      - name: Run News Generator Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_news.py

      - name: Commit and Push Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "GN$(date +'%Y%m%d')A1" || echo "No changes to commit"
          git push

      # --- UPDATED STEP FOR '4th March 2026' FORMAT (WITH IST TIMEZONE) ---
      - name: Get Formatted Date
        run: |
          export TZ='Asia/Kolkata'
          DAY=$(date +%-d)
          case $DAY in
            1|21|31) SUFFIX="st";;
            2|22)    SUFFIX="nd";;
            3|23)    SUFFIX="rd";;
            *)       SUFFIX="th";;
          esac
          MONTH_YEAR=$(date +'%B %Y')
          echo "NOW=${DAY}${SUFFIX} ${MONTH_YEAR}" >> $GITHUB_ENV

      # --- SEND THE FORMATTED HTML EMAIL ---
      - name: Send Breaking News Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}

          # Your new, clean subject line!
          subject: "Breaking News: ${{ env.NOW }}"

          to: ${{ secrets.GMAIL_USER }}
          from: "The Gemini Chronicle Agent"
          html_body: file://email_body.html

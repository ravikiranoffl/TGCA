name: Daily Global News Generator

on:
  schedule:
    # Runs at 11:12 PM IST (17:42 UTC) to bypass top-of-hour traffic spikes
    - cron: '42 17 * * *' 
  workflow_dispatch:      # Manual trigger for testing

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        # Clean inline installation, bypassing the need for a requirements.txt file
        run: pip install google-genai beautifulsoup4 requests

      - name: Run News Generator Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: python generate_news.py

      - name: Commit and Push Updates
        run: |
          git config --local user.email "tgca-bot@users.noreply.github.com"
          git config --local user.name "tgca-bot"
          git add .
          git commit -m "GN$(date +'%Y%m%d')A1" || echo "No changes to commit"
          git push

      - name: Get Formatted Date
        run: |
          export TZ='Asia/Kolkata'
          DAY=$(date +%-d)
          case $DAY in
            1|21|31) SUFFIX="st";;
            2|22)    SUFFIX="nd";;
            3|23)    SUFFIX="rd";;
            *)       SUFFIX="th";;
          esac
          MONTH_YEAR=$(date +'%B %Y')
          echo "NOW=${DAY}${SUFFIX} ${MONTH_YEAR}" >> $GITHUB_ENV

      - name: Send Breaking News Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Breaking News: ${{ env.NOW }}"
          to: ${{ secrets.GMAIL_USER }}
          from: "The Gemini Chronicle Agent"
          html_body: file://email_body.html

name: Daily Global News Generator

on:
  schedule:
    - cron: '30 17 * * *'
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Updated to Python 3.12

      - name: Install Google GenAI Library
        run: pip install google-genai # Updated to the new library

      - name: Run News Generator Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_news.py

      - name: Commit and Push the New File
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 2026/
          git commit -m "GN$(date +'%Y%m%d')A1" || echo "No changes to commit"
          git push

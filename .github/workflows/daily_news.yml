name: Daily Global News Generator

on:
  schedule:
    - cron: '30 17 * * *' # Runs at 11:00 PM IST (17:30 UTC)
  workflow_dispatch:      # Allows you to run it manually for testing

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install google-genai

      - name: Run News Generator Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_news.py

      - name: Commit and Push Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # GN + YearMonthDay + A1 format for commits
          git commit -m "GN$(date +'%Y%m%d')A1" || echo "No changes to commit"
          git push

      # --- SET THE FORMATTED DATE (e.g., 3 March 2026) ---
      - name: Get Current Date
        id: date
        # %-d removes leading zero, %B is full month name
        run: echo "NOW=$(date +'%-d %B %Y')" >> $GITHUB_ENV

      # --- SEND THE TELUGU HTML EMAIL ---
      - name: Send Breaking News Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          
          # Telugu Subject Line with formatted date
          subject: "ముఖ్యాంశాలు: ${{ env.NOW }} నేటి వార్తా నివేదిక"
          
          to: ${{ secrets.GMAIL_USER }}
          from: "జెమిని వార్తా వాహిని"
          html_body: file://email_body.html
